<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradientBlack" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradientGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffed4e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#gradientBlack)" filter="url(#shadow)"/>
  
  <!-- Trophy/Podium shape -->
  <g transform="translate(100, 80)">
    <!-- Left step -->
    <rect x="-50" y="20" width="25" height="35" fill="#ff6b6b" opacity="0.9" rx="2"/>
    <text x="-37" y="52" font-size="16" font-weight="bold" fill="white" text-anchor="middle">2</text>
    
    <!-- Center step (tallest) -->
    <rect x="-12" y="0" width="24" height="55" fill="url(#gradientGold)" rx="2"/>
    <text x="0" y="32" font-size="18" font-weight="bold" fill="#000" text-anchor="middle">1</text>
    
    <!-- Right step -->
    <rect x="25" y="28" width="25" height="27" fill="#cd7f32" opacity="0.9" rx="2"/>
    <text x="37" y="50" font-size="14" font-weight="bold" fill="white" text-anchor="middle">3</text>
  </g>
  
  <!-- Top accent - crown-like -->
  <path d="M 70 45 L 85 25 L 100 35 L 115 25 L 130 45" stroke="url(#gradientGold)" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Sparkle accent stars -->
  <circle cx="55" cy="50" r="2.5" fill="url(#gradientGold)"/>
  <circle cx="145" cy="50" r="2.5" fill="url(#gradientGold)"/>
  <circle cx="70" cy="155" r="2" fill="url(#gradientGold)"/>
  <circle cx="130" cy="155" r="2" fill="url(#gradientGold)"/>
  
  <!-- Text: RANK DEKHO -->
  <text x="100" y="170" font-size="14" font-weight="800" fill="url(#gradientGold)" text-anchor="middle" letter-spacing="1">RANK DEKHO</text>
  
  <!-- Subtle line accent -->
  <line x1="60" y1="178" x2="140" y2="178" stroke="url(#gradientGold)" stroke-width="1.5" opacity="0.6"/>
</svg>